services:
  db:
    image: postgres:16-alpine
    container_name: veille-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: veille
      POSTGRES_PASSWORD: veille
      POSTGRES_DB: veille_ao_btp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veille"]
      interval: 10s
      timeout: 5s
      retries: 5

  renov-midi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renov-midi
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://veille:veille@db:5432/veille_ao_btp"
      SESSION_SECRET: "${SESSION_SECRET:-96aeffa02d010b4c61812333154f4c60}"
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.example.description: "Renov Midi - Veille AO BTP"

volumes:
  postgres-data:
    driver: local
