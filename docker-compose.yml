version: "3.8"

services:
  renov-midi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renov-midi
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database (SQLite in persistent volume)
      DATABASE_URL: "file:/app/data/renov-midi.db"
      # Session
      SESSION_SECRET: "${SESSION_SECRET:-96aeffa02d010b4c61812333154f4c60}"
      # Optional: tunnel password (remove for local testing)
      # TUNNEL_PASSWORD: "your-secure-password"
      # Environment
      NODE_ENV: "production"
    volumes:
      # Persistent SQLite database
      - renov-midi-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.example.description: "Renov Midi - Veille AO BTP"

volumes:
  renov-midi-data:
    driver: local
